name: Build Fabric Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Detect project structure and build
        run: |
          # Check if vmod directory exists
          if [ -d "vmod" ]; then
            cd vmod
            BUILD_DIR="vmod"
            echo "Building in vmod directory..."
          else
            BUILD_DIR="."
            echo "Building in root directory..."
          fi
          
          # Make gradle wrapper executable if it exists
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew build
          else
            echo "gradlew not found, using gradle from PATH..."
            gradle wrapper
            chmod +x gradlew
            ./gradlew build
          fi

      - name: Find and upload JAR files
        uses: actions/upload-artifact@v4
        with:
          name: vmod-build-artifacts
          path: build/libs
          retention-days: 30
        if: always()

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            vmod/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

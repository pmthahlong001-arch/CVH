name: Build Fabric Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build vmod project
        run: |
          # Try to find vmod directory
          if [ -d "src/main/java/com/vmod" ]; then
            # Project at root level
            echo "Building Fabric Mod at root..."
            if [ ! -f gradlew ]; then
              gradle wrapper --gradle-version 8.5
            fi
            chmod +x gradlew
            ./gradlew build -x test
          else
            echo "Building from vmod directory..."
            cd vmod
            if [ ! -f gradlew ]; then
              echo "Creating gradlew in vmod..."
              gradle wrapper --gradle-version 8.5
            fi
            chmod +x gradlew
            ./gradlew build -x test
          fi

      - name: Find JAR files
        run: find . -name "*.jar" -path "*/build/libs/*" -type f

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmod-build
          path: |
            build/libs
            vmod/build/libs
          retention-days: 30
        if: always()

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            vmod/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
